<header class="navigation" role="banner">
	<div class="navigation-wrapper">
		<a href="{{ site.baseurl }}/" class="logo">
			{% if site.logo %}
			<img
				src="{{ site.logo | prepend: site.baseurl }}"
				alt="{{ site.title }}"
			/>
			{% else %}
			<span>{{ site.title }}</span>
			{% endif %}
		</a>
		<button type="button" id="js-mobile-menu" class="navigation-menu-button"
			aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="js-navigation-menu">
			<i class="fa fa-bars" aria-hidden="true"></i>
		</button>
		<nav role="navigation" aria-label="Main">
			<ul id="js-navigation-menu" class="navigation-menu show">
				{% include nav_links.html %}
				<li class="nav-link theme-toggle-item">
					<button type="button" id="theme-toggle" class="theme-toggle"
						aria-label="Toggle dark mode" title="Toggle dark mode">
						<i class="fa-regular fa-moon" aria-hidden="true"></i>
					</button>
				</li>
			</ul>
		</nav>
	</div>
</header>
